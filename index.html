<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนการฝึกอบรม กปภ. - Interactive Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border-left: 4px solid #3498db;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 1rem;
            font-weight: 500;
        }

        .filters {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
        }

        .filter-item label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .filter-item select, .filter-item input {
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: all 0.3s ease;
        }

        .filter-item select:focus, .filter-item input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .reset-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            height: fit-content;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .project-card.has-courses {
            border-color: rgba(52, 152, 219, 0.2);
            cursor: pointer;
        }

        .project-card.has-courses:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border-color: rgba(52, 152, 219, 0.4);
        }

        .project-card.no-courses {
            border-color: rgba(189, 195, 199, 0.3);
            opacity: 0.7;
        }

        .project-card.expanded {
            border-color: #3498db;
        }

        .project-card-header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .project-icon {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3);
        }

        .project-details {
            flex: 1;
        }

        .project-number {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.3;
        }

        .project-summary {
            text-align: right;
        }

        .stats-mini {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }

        .stat-mini {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: 600;
        }

        .expand-button {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .expand-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .no-courses-badge {
            background: #bdc3c7;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .project-expanded-content {
            border-top: 1px solid #ecf0f1;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 1000px;
            }
        }

        .project-stats-detail {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.05), rgba(155, 89, 182, 0.05));
        }

        .stat-detail-item {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-detail-item .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
        }

        .stat-detail-item .stat-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            font-weight: 600;
        }

        .sub-project-section {
            margin-bottom: 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .sub-project-section:last-child {
            border-bottom: none;
        }

        .sub-project-title {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.1), rgba(192, 57, 43, 0.1));
            padding: 15px 25px;
            margin: 0;
            font-size: 1.1rem;
            color: #2c3e50;
            border-left: 4px solid #e74c3c;
        }

        .courses-list {
            padding: 0;
        }

        .course-item {
            padding: 20px 25px;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.2s ease;
        }

        .course-item:last-child {
            border-bottom: none;
        }

        .course-item:hover {
            background: #f8f9fa;
        }

        .course-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 15px;
        }

        .course-name {
            font-weight: 600;
            color: #2c3e50;
            flex: 1;
            line-height: 1.4;
        }

        .course-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .course-type-badge {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .quarter-badge-small {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .course-item-details {
            margin-top: 10px;
        }

        .detail-row {
            margin-bottom: 10px;
        }

        .detail-label {
            font-weight: 600;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .detail-text {
            color: #2c3e50;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .course-item-stats {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #7f8c8d;
            font-weight: 600;
            margin-top: 10px;
        }

        .course-item-stats span {
            background: rgba(52, 152, 219, 0.1);
            padding: 4px 8px;
            border-radius: 8px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow: hidden;
        }

        .modal.show {
            opacity: 1;
        }

        .modal-content-wrapper {
            width: 95%;
            max-width: 1400px;
            max-height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .modal.show .modal-content-wrapper {
            transform: scale(1);
        }

        .modal-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            max-height: 100%;
            min-height: 0;
        }

        .modal-header {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-project-info {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .modal-project-icon {
            font-size: 3rem;
            background: rgba(255, 255, 255, 0.2);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal-project-details {
            flex: 1;
        }

        .modal-project-number {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .modal-project-title {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.3;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.05), rgba(155, 89, 182, 0.05));
            flex-shrink: 0;
        }

        .modal-stat-item {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .modal-stat-item:hover {
            transform: translateY(-5px);
        }

        .modal-stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 10px;
        }

        .modal-stat-label {
            color: #7f8c8d;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .modal-body {
            padding: 30px;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            /* Custom scrollbar */
            scrollbar-width: thin;
            scrollbar-color: rgba(52, 152, 219, 0.5) transparent;
        }

        .modal-body::-webkit-scrollbar {
            width: 8px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(52, 152, 219, 0.5);
            border-radius: 4px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(52, 152, 219, 0.7);
        }

        /* Scroll indicator */
        .modal-body.has-more-content::after {
            content: '';
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, transparent 100%);
            pointer-events: none;
            z-index: 10;
        }

        .modal-body.has-more-content::before {
            content: '⏬ เลื่อนลงเพื่อดูเพิ่มเติม';
            position: sticky;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(52, 152, 219, 0.9);
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            text-align: center;
            animation: bounceY 2s infinite;
            z-index: 20;
            pointer-events: none;
        }

        @keyframes bounceY {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-5px); }
            60% { transform: translateX(-50%) translateY(-3px); }
        }

        .modal-sub-project {
            margin-bottom: 40px;
        }

        .modal-sub-project-title {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 20px 25px;
            margin: 0 0 25px 0;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
        }

        .modal-courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .modal-course-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 4px solid #3498db;
            transition: all 0.3s ease;
        }

        .modal-course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .modal-course-header {
            margin-bottom: 20px;
        }

        .modal-course-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .modal-course-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .modal-course-type {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .modal-quarter {
            background: #e74c3c;
            color: white;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .modal-course-details {
            margin-top: 15px;
        }

        .modal-detail-row {
            margin-bottom: 12px;
        }

        .modal-detail-label {
            font-weight: 600;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .modal-detail-value {
            color: #2c3e50;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .modal-course-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }

        .modal-stat-mini {
            text-align: center;
            background: rgba(52, 152, 219, 0.1);
            padding: 12px 8px;
            border-radius: 10px;
        }

        .modal-stat-mini-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            display: block;
        }

        .modal-stat-mini-label {
            font-size: 0.7rem;
            color: #7f8c8d;
            margin-top: 2px;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .course-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            flex: 1;
            min-width: 300px;
        }

        .course-type {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .course-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-group {
            background: rgba(52, 152, 219, 0.05);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #3498db;
        }

        .detail-label {
            font-weight: 600;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: #2c3e50;
            font-size: 1rem;
            line-height: 1.4;
        }

        .course-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.1), rgba(155, 89, 182, 0.1));
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            transform: scale(1.05);
        }

        .stat-item .number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            display: block;
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .quarter-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 10;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .no-results h3 {
            color: #7f8c8d;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .no-results p {
            color: #bdc3c7;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .filter-group {
                grid-template-columns: 1fr;
            }
            
            .courses-grid {
                grid-template-columns: 1fr;
            }

            .project-card-header {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }

            .project-info {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .project-icon {
                align-self: center;
            }

            .project-summary {
                text-align: center;
            }

            .stats-mini {
                align-items: center;
            }

            .project-stats-detail {
                grid-template-columns: repeat(2, 1fr);
            }

            .course-item-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .course-badges {
                justify-content: flex-start;
            }

            .course-item-stats {
                flex-wrap: wrap;
                gap: 8px;
            }

            .expand-button {
                font-size: 0.8rem;
                padding: 8px 12px;
            }

            /* Modal responsive styles */
            .modal-content-wrapper {
                width: 98%;
                max-height: 95vh;
                margin: 10px;
            }

            .modal-header {
                padding: 20px;
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }

            .modal-project-info {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .modal-project-icon {
                width: 60px;
                height: 60px;
                font-size: 2rem;

            const totalBudget = courses.reduce((sum, course) => sum + course['รวม คชจ.'], 0);
            const totalParticipants = courses.reduce((sum, course) => sum + course['จน. คน'], 0);
            const totalDays = courses.reduce((sum, course) => sum + course['จน. วัน'], 0);

            return {
                totalCourses,
                totalBudget,
                totalParticipants,
                totalDays
            };
        }

        // ฟังก์ชันสำหรับจัดกลุ่มหลักสูตรตามโครงการหลัก
        function groupCoursesByProject(courses) {
            const grouped = {};
            
            // สร้างกลุ่มสำหรับทุกโครงการหลัก
            allMainProjects.forEach(project => {
                grouped[project] = {};
            });
            
            // จัดกลุ่มหลักสูตรที่มีอยู่
            courses.forEach(course => {
                const mainProject = course['โครงการหลัก'];
                if (!grouped[mainProject]) {
                    grouped[mainProject] = {};
                }
                
                const subProject = course['โครงการย่อย'] || 'ไม่มีโครงการย่อย';
                if (!grouped[mainProject][subProject]) {
                    grouped[mainProject][subProject] = [];
                }
                
                grouped[mainProject][subProject].push(course);
            });
            return grouped;
        }

        // ฟังก์ชันสำหรับสร้างไอคอนโครงการ
        function getProjectIcon(projectName) {
            if (projectName.includes('คณะกรรมการและผู้บริหาร')) return '👥';
            if (projectName.includes('เทคโนโลยีดิจิทัล')) return '💻';
            if (projectName.includes('มูลค่าเพิ่ม')) return '📈';
            if (projectName.includes('IDP')) return '🎯';
            if (projectName.includes('วัฒนธรรม')) return '🤝';
            if (projectName.includes('Mindset')) return '🧠';
            if (projectName.includes('ประชุม')) return '📚';
            if (projectName.includes('คุณธรรม')) return '⚖️';
            if (projectName.includes('CSR')) return '🌍';
            if (projectName.includes('ทุนการศึกษา')) return '🎓';
            return '📋';
        }

                totalParticipants: courses.reduce((sum, course) => sum + course['จน. คน'], 0),
                totalDays: courses.reduce((sum, course) => sum + course['จน. วัน'], 0)
            };
        }

                const hasCourses = stats !== null;
                
                html += `
                    <div class="project-card ${hasCourses ? 'has-courses' : 'no-courses'} fade-in" data-project-index="${index}">
                        <div class="project-card-header" ${hasCourses ? `onclick="toggleProject(${index})"` : ''}>
                            <div class="project-info">
                                <div class="project-icon">${projectIcon}</div>
                                <div class="project-details">
                                    <div class="project-number">โครงการ ${projectNumber}</div>
                                    <div class="project-title">${mainProject.replace(/^\d+\.\s*/, '')}</div>
                                </div>
                            </div>
                            <div class="project-summary">
                                ${hasCourses ? `
                                    <div class="stats-mini">
                                        <span class="stat-mini">${stats.totalCourses} หลักสูตร</span>
                                        <span class="stat-mini">${(stats.totalBudget / 1000000).toFixed(1)}M บาท</span>
                                    </div>
                                    <button class="expand-button">📥 ดูรายละเอียด</button>
                                ` : `
                                    <div class="no-courses-badge">ยังไม่มีหลักสูตร</div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            });

            if (html === '') {
                coursesContainer.innerHTML = '';
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                coursesContainer.innerHTML = html;
            }
        }

        // ฟังก์ชันสำหรับกรองข้อมูล
        function filterCourses() {
            const quarterFilter = document.getElementById('quarterFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const formatFilter = document.getElementById('formatFilter').value;
            const searchFilter = document.getElementById('searchFilter').value.toLowerCase();

            filteredCourses = coursesData.filter(course => {
                const matchQuarter = !quarterFilter || course['ไตรมาส'].toString() === quarterFilter;
                const matchType = !typeFilter || course['ประเภท'] === typeFilter;
                const matchFormat = !formatFilter || course['รูปแบบ'] === formatFilter;
                const matchSearch = !searchFilter || 
                    course['หลักสูตร/โครงการ'].toLowerCase().includes(searchFilter) ||
                    course['โครงการหลัก'].toLowerCase().includes(searchFilter) ||
                    course['โครงการย่อย'].toLowerCase().includes(searchFilter);

                return matchQuarter && matchType && matchFormat && matchSearch;
            });

            const stats = calculateStats(filteredCourses);
            renderStats(stats);
            renderCourses(filteredCourses);
        }

        // ฟังก์ชันรีเซ็ตตัวกรอง
        function resetFilters() {
            document.getElementById('quarterFilter').value = '';
            document.getElementById('typeFilter').value = '';
            document.getElementById('formatFilter').value = '';
            document.getElementById('searchFilter').value = '';
            filterCourses();
        }

        // Event listeners
        document.getElementById('quarterFilter').addEventListener('change', filterCourses);
        document.getElementById('typeFilter').addEventListener('change', filterCourses);
        document.getElementById('formatFilter').addEventListener('change', filterCourses);
        document.getElementById('searchFilter').addEventListener('input', filterCourses);

        // Keyboard event สำหรับปิด modal ด้วย ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const modal = document.getElementById('projectModal');
                if (modal.style.display === 'flex') {
                    closeModal();
                }
            }
        });

        // ฟังก์ชันเพิ่มแสดง scroll indicator ใน modal
        function checkScrollIndicator() {
            const modalBody = document.getElementById('modalBodyContent');
            if (modalBody) {
                const isScrollable = modalBody.scrollHeight > modalBody.clientHeight;
                const isAtBottom = modalBody.scrollTop + modalBody.clientHeight >= modalBody.scrollHeight - 10;
                
                // เพิ่ม class สำหรับ CSS styling ของ scroll indicator
                if (isScrollable && !isAtBottom) {
                    modalBody.classList.add('has-more-content');
                } else {
                    modalBody.classList.remove('has-more-content');
                }
            }
        }

        // Event listener สำหรับตรวจสอบการ scroll ใน modal
        function addModalScrollListeners() {
            const modalBody = document.getElementById('modalBodyContent');
            if (modalBody) {
                modalBody.addEventListener('scroll', checkScrollIndicator);
                // ตรวจสอบครั้งแรกเมื่อ modal เปิด
                setTimeout(checkScrollIndicator, 100);
            }
        }

        // เริ่มต้นการแสดงผล
        document.addEventListener('DOMContentLoaded', function() {
            const stats = calculateStats(coursesData);
            renderStats(stats);
            renderCourses(coursesData);
        });
    </script>
</body>
</html>
